<body>
<div class="wrap">
  <div class="topbar">
    <div><div class="title">忍者之夜 Night of Ninja v2.4</div><div class="sub">4～11人｜自由打字判斷＋AI可讀懂發言＋獨立100局記憶庫｜1920×1080優化｜AI獨立視野</div></div>
    <div class="row"><label class="small">AI反應速度 <input id="aiSpeed" type="range" min="0.5" max="3" step="0.1" value="1.0" oninput="setAISpeed(this.value)"> <span id="aiSpeedLabel">1.0秒</span></label><label class="small">AI發言密度 <input id="aiTalk" type="range" min="0.5" max="2.5" step="0.1" value="1.6" oninput="setAITalkRate(this.value)"> <span id="aiTalkLabel">1.6倍</span></label><button id="pauseToggleBtnTop" class="secondary" onclick="togglePause()">⏸ 暫停</button><button class="secondary" onclick="resetGame()">重新開始</button></div>
  </div>

    <h2>選擇玩家人數</h2>
    <div class="setupGrid">
      <button class="setupBtn" onclick="startGame(4)">4 人局</button>
      <button class="setupBtn" onclick="startGame(5)">5 人局</button>
      <button class="setupBtn" onclick="startGame(6)">6 人局</button>
      <button class="setupBtn" onclick="startGame(7)">7 人局</button>
      <button class="setupBtn" onclick="startGame(8)">8 人局</button>
      <button class="setupBtn" onclick="startGame(9)">9 人局</button>

      <button class="setupBtn" onclick="startGame(11)">11 人局</button>

    <div class="footerNote">1名玩家隨機進入座位，其餘為簡易AI。AI反應速度可調0.5～3秒；主持人AI只負責流程，不互通AI私人資訊。</div>
  </section>

  <section id="game" class="hidden">
    <div class="layout">
      <div>
        <div class="panel hostScreen">

          <div id="humanResultBanner" class="humanResultBanner hidden"></div>

        <div class="panel">
          <div class="row" style="justify-content:space-between">
            <h3 style="margin:0">玩家區</h3>

      </div>

        <div class="phaseList" id="phaseList"></div>

<script>

function gameTimeout(fn, ms){
  return window.setTimeout(()=>{
    if(isGamePaused()){
      if(G){ (G.pausedCallbacks||(G.pausedCallbacks=[])).push(fn); }
      return;
    }
    fn&&fn();
  }, ms);
}

function makeDeck(){ const deck=[]; for(const t of TYPES){ for(let n=1;n<=6;n++) deck.push({type:t,num:n,used:false,id:t+n+'-'+Math.random()}); } deck.push({type:'殉道者',num:0,used:false,id:'martyr'}); deck.push({type:'還施僧',num:0,used:false,id:'counter'}); deck.push({type:'首腦',num:0,used:false,id:'mastermind'}); return shuffle(deck); }
function makeRoles(n){ const roles=[]; const m=Math.floor(n/2); for(let i=1;i<=m;i++){roles.push({faction:'蓮花',num:i});roles.push({faction:'仙鶴',num:i});} if(n%2===1)roles.push({faction:'浪人',num:0}); return shuffle(roles); }
function startGame(n){
  const humanSeat=Math.floor(Math.random()*n);
  G={n,round:1,humanSeat,players:[],deck:makeDeck(),discard:[],honorBag:shuffle([...honorBase]),stage:'draft1',announceQueue:[],currentAnnounce:null,known:{},draftPass:[],logSecret:false,timerId:null,activeActorId:null,activeTargetIds:[],aiSpeed:DEFAULT_AI_SPEED,publicClaims:[],paused:false,pausedCallbacks:[],aiTalkRate:DEFAULT_AI_TALK_RATE};
  const roles=makeRoles(n);
  const names=shuffle([...AI_NAMES]).slice(0,n-1);
  let aiIndex=0;
  for(let i=0;i<n;i++){
    const isHuman=i===humanSeat;
    G.players.push({id:i,isHuman,isAI:!isHuman,name:isHuman?'玩家':names[aiIndex++],persona:isHuman?'玩家':AI_PERSONAS[Math.floor(Math.random()*AI_PERSONAS.length)],role:roles[i],alive:true,hand:[],draft:[],honors:[],revealed:false,infoLog:[],lastSpeech:'',manualMarks:{},memory:{roles:{},cards:{},claims:[]},aiDB:{rounds:[],trust:{},lies:0,trueTalk:0}});
  }
  for(const p of G.players){ p.draft=G.deck.splice(0,3); ensureAIDB(p); addInfo(p,`你的流派：${roleName(p.role)}`); if(p.isAI)addInfo(p,`AI獨立記憶庫：${aiDBCount(p)}/100局，不共享給其他AI。`); }
  document.getElementById('setup').classList.add('hidden'); document.getElementById('game').classList.remove('hidden'); updatePauseUI();
  log(`第 ${G.round} 局開始。玩家隨機坐在第 ${humanSeat+1} 號座位。AI姓名已隨機建立，榮譽會跟著人物移動。`,'info'); markProgress('開局'); startFlowWatchdog(); render(); beginDraft1(); showPrivate(humanSeat);
}

    box.appendChild(div);

function chooseDraftIndex(p,cards){
  let best=0, bv=-999;
  cards.forEach((c,i)=>{ let v=cardBaseValue(c,p); if(c.type==='首腦')v+=p.role.faction==='浪人'?80:45; if(v>bv){bv=v;best=i;} });
  return best;
}
function cardBaseValue(c,p){
  if(!c)return 0; const map={上忍:90,盲眼刺客:75,隱士:65,密探:55,騙徒:50,還施僧:70,殉道者:35,首腦:75};
  let v=map[c.type]||30; if(c.type==='騙徒')v+=({1:25,2:15,3:10,4:5,5:5,6:35}[c.num]||0); return v+Math.random()*12;
}
function isEnemy(self,role){ if(!role||self.role.faction==='浪人')return false; return role.faction!=='浪人' && role.faction!==self.role.faction; }
function isFriend(self,role){ return role&&self.role.faction!=='浪人'&&role.faction===self.role.faction; }
function knownRole(self,target){ return target.revealed?target.role:(self.memory&&self.memory.roles[target.id]); }
function chooseInfoTargetAI(actor){
  const candidates=G.players.filter(t=>t.id!==actor.id&&t.alive);
  const unknown=candidates.filter(t=>!knownRole(actor,t));
  return (unknown.length?unknown:candidates)[Math.floor(Math.random()*(unknown.length?unknown.length:candidates.length))];
}
function aiTrustWeight(actor, speakerId){
  const db=ensureAIDB(actor);
  if(!db||speakerId===undefined||speakerId===null)return 0.35;
  const v=db.trust[speakerId];
  if(v===undefined)return 0.35;
  return Math.max(0.05, Math.min(0.85, v/100));
}
function claimInfluence(actor,target){
  let v=0;
  const claims=(G.publicClaims||[]).slice(0,20);
  for(const c of claims){
    const trust=aiTrustWeight(actor,c.by);
    if(c.target===target.id){
      if(c.type==='targetFaction'){
        const fake={faction:c.faction,num:5};
        if(isEnemy(actor,fake))v+=70*trust;
        if(isFriend(actor,fake))v-=70*trust;
        if(c.faction==='浪人')v-=12*trust;
      }
      if(c.type==='notTargetFaction'){
        const fake={faction:c.faction,num:5};
        if(isEnemy(actor,fake))v-=28*trust;
        if(isFriend(actor,fake))v+=20*trust;
      }
      if(c.type==='targetNum')v+=(6-c.num)*8*trust;
      if(c.type==='suspect')v+=45*trust;
      if(c.type==='trust')v-=35*trust;
      if(c.type==='mastermind')v+=26*trust;
    }
    if((c.type==='sameTeam'||c.type==='notSameTeam') && (c.a===target.id||c.b===target.id)){
      const otherId=c.a===target.id?c.b:c.a;
      const other=G.players[otherId];
      const kr=other?knownRole(actor,other):null;
      if(kr){
        if(c.type==='sameTeam'){
          if(isEnemy(actor,kr))v+=30*trust;
          if(isFriend(actor,kr))v-=30*trust;
        }else{
          if(isEnemy(actor,kr))v-=18*trust;
          if(isFriend(actor,kr))v+=18*trust;
        }
      }
    }
  }
  return v;
}
function chooseKillTargetAI(actor,allowRandom=false){
  const candidates=G.players.filter(t=>t.id!==actor.id&&t.alive);
  let scored=candidates.map(t=>{
    const r=knownRole(actor,t); let v=0;
    if(isEnemy(actor,r))v+=220+(6-(r.num||5))*45;
    if(isFriend(actor,r))v-=330;
    if(r&&r.faction==='浪人')v-=35;
    if(!r){ v+=claimInfluence(actor,t); }
    else { v+=claimInfluence(actor,t)*0.25; }
    v+=Math.random()*20; return {t,v};
  }).sort((a,b)=>b.v-a.v);
  if(scored[0]&&scored[0].v>80)return scored[0].t;
  if(allowRandom&&Math.random()<0.35)return candidates[Math.floor(Math.random()*candidates.length)];
  return null;
}

function cardValue(c){
  if(!c)return 0;
  if(c.type==='首腦')return 110;
  if(c.type==='還施僧')return 100;
  if(c.type==='上忍')return 92;
  if(c.type==='盲眼刺客')return 84;
  if(c.type==='騙徒')return ({1:76,2:72,3:62,4:44,5:54,6:86}[c.num]||50);
  if(c.type==='隱士')return 68;
  if(c.type==='密探')return 56;
  if(c.type==='殉道者')return 45;
  return 30;
}
function aiWantsActivate(p,a){
  if(!p.alive)return false;
  if(a.type==='密探'||a.type==='隱士'||a.type==='上忍')return true;
  if(a.type==='盲眼刺客')return !!chooseKillTargetAI(p,false) || Math.random()<0.22;
  if(a.type==='騙徒')return true;
  return false;
}
function aiActivateCard(p){
  markProgress(p.name+' aiActivateCard');
  const a=G.currentAnnounce; const c=p.hand.find(x=>!x.used&&x.type===a.type&&x.num===a.num); if(!c){nextAnnounce();return;} c.used=true; markAction(p,[]); log(`${p.name} 翻開並發動 ${cardName(c)}。`,'ok'); showActionPopup(p,c,null,'翻開發動'); render(); resolveCardAI(p,c);
}
function resolveCardAI(p,c){
  markProgress(p.name+' resolve '+cardName(c));

  else if(c.type==='隱士'){ const t=chooseInfoTargetAI(p); markAction(p,t); showInspectEffect(t); const card=t.hand.find(x=>!x.used)||t.hand[0]; rememberRole(p,t); rememberCard(p,t,card); showActionPopup(p,c,t,'偵查流派與忍者牌'); log(`${p.name} 使用隱士查看 ${t.name}。結果只寫入該AI腦中。`); aiMaybeSpeakInfo(p,t); gameTimeout(nextAnnounce,aiDelay()); }
  else if(c.type==='盲眼刺客'){ const t=chooseKillTargetAI(p,true); if(t)attemptKill(p,t,'盲眼刺客'); else {log(`${p.name} 沒有把握，盲眼刺客不出手。`); gameTimeout(nextAnnounce,aiDelay(.75));} }
  else if(c.type==='上忍'){ const t=chooseInfoTargetAI(p); markAction(p,t); showInspectEffect(t); rememberRole(p,t); showActionPopup(p,c,t,'查看流派'); aiMaybeSpeakInfo(p,t); if(isEnemy(p,t.role))attemptKill(p,t,'上忍'); else {log(`${p.name} 使用上忍查看 ${t.name}，選擇不擊殺。`); gameTimeout(nextAnnounce,aiDelay());} }
  else if(c.type==='騙徒')resolveTricksterAI(p,c);
}
function resolveTricksterAI(p,c){
  if(c.num===1){ const a=chooseInfoTargetAI(p); rememberRole(p,a); let b=chooseInfoTargetAI(p); if(b&&b.id===a.id){ b=G.players.find(x=>x.id!==p.id&&x.id!==a.id&&x.alive)||b; } if(b)rememberRole(p,b); markAction(p,[a,b].filter(Boolean)); showTricksterPopup(p,c,[a,b].filter(Boolean),'百變者探查兩人；兩人的流派或許已被交換');
    if(b && shouldAISwapRoles(p,a,b)){ swapRolesSecret(a.id,b.id,p.id); }
    else log(`百變者效果結算：${p.name} 探查了 ${a.name}${b?'、'+b.name:''}，兩人的流派或許已被交換。`,'info');
    gameTimeout(nextAnnounce,Math.max(3000,aiDelay())); }
  else if(c.num===2){
    const sample=G.discard.slice(-2);
    if(sample.length){
      let got=sample.sort((a,b)=>cardValue(b)-cardValue(a))[0];
      const idx=G.discard.indexOf(got);
      got=G.discard.splice(idx,1)[0];
      const canNow=canImmediatePlay(got);
      if(canNow && aiShouldImmediatePlay(p,got)){
        got.used=true;
        showTricksterPopup(p,c,null,`掘墓人取得 ${cardName(got)} 並立刻打出`); log(`${p.name} 使用掘墓人取得 ${cardName(got)}，並立刻打出。`,'ok');
        resolveCardAI(p,got);
        return;
      } else {
        p.hand.push(got);
        addInfo(p,`掘墓人取得：${cardName(got)}`);
        log(`${p.name} 使用掘墓人取得 ${cardName(got)}，保留到之後。`);
      }
    } else log(`${p.name} 使用掘墓人，但棄牌堆沒有可拿的牌。`);
    gameTimeout(nextAnnounce,aiDelay());
  }
  else if(c.num===3){ const t=chooseInfoTargetAI(p); markAction(p,t); rememberRole(p,t); showTricksterPopup(p,c,t,'搗蛋鬼查看'); aiMaybeSpeakInfo(p,t); if(isEnemy(p,t.role)&&t.role.num<=2){t.revealed=true; publicRevealToAll(t); log(`${p.name} 使用搗蛋鬼公開揭示 ${t.name}。`);} else log(`${p.name} 使用搗蛋鬼查看 ${t.name}，不公開。`); render(); gameTimeout(nextAnnounce,aiDelay()); }
  else if(c.num===4){ const t=chooseInfoTargetAI(p); markAction(p,t); rememberRole(p,t); showTricksterPopup(p,c,t,'靈魂商販查看'); log(`${p.name} 使用靈魂商販查看情報。`); gameTimeout(nextAnnounce,aiDelay()); }
  else if(c.num===5){ const targets=G.players.filter(x=>x.id!==p.id&&x.honors.length); if(targets.length){ const t=targets[Math.floor(Math.random()*targets.length)]; markAction(p,t); p.revealed=true; p.honors.push(t.honors.pop()); showTricksterPopup(p,c,t,'竊賊偷取榮譽'); log(`${p.name} 使用竊賊偷取 ${t.name} 一枚榮譽。`);} else log(`${p.name} 的竊賊沒有目標。`); render(); gameTimeout(nextAnnounce,aiDelay()); }
  else if(c.num===6){ p.revealed=true; const t=chooseKillTargetAI(p,true); render(); if(t)attemptKill(p,t,'裁判'); else {log(`${p.name} 使用裁判但沒有擊殺。`); gameTimeout(nextAnnounce,aiDelay());} }
}

function beginDraft1(){ G.stage='draft1'; setHost('輪抽階段','所有玩家查看3張忍者牌，先保留1張。',`<button onclick="draftPickPlayer(0)">開始玩家1選牌</button>`); render(); }

function finishDraft2(){ log('輪抽結束。每位玩家持有2張忍者牌。','ok'); buildAnnounceQueue(); nextAnnounce(); }
function buildAnnounceQueue(){ G.announceQueue=[]; for(const type of TYPES){ for(let n=1;n<=6;n++) G.announceQueue.push({type,num:n}); } }
function nextAnnounce(){
  markProgress('nextAnnounce');
  clearAISafety();
  if(G.timerId){ clearInterval(G.timerId); G.timerId=null; }
  clearActionMarkers();
  closeModal();
  if(G.announceQueue.length===0){ beginReveal(); return; }
  G.currentAnnounce=G.announceQueue.shift(); G.stage='action'; render();
  const a=G.currentAnnounce;
  setHost(announceCardLabel(a),`主持人宣告：<b>${announceCardLabel(a)}</b><br>效果：${announceCardEffect(a)}<br><span class="small">持有者可選擇是否翻面發動；若無持有者，倒數結束自動跳過。</span>`, `<button class="secondary" onclick="skipAnnounce()">手動跳過</button><button class="danger" onclick="forceNext('手動救援')">強制下一步</button>`);

function startCountdown(sec, cb){
  if(G.timerId){ clearInterval(G.timerId); G.timerId=null; }
  let left=sec*10; const t=document.getElementById('timer');
  t.textContent=`${(left/10).toFixed(1)} 秒`;
  G.timerId=setInterval(()=>{ if(isGamePaused())return; left--; t.textContent=`${(left/10).toFixed(1)} 秒`; if(left<=0){clearInterval(G.timerId); G.timerId=null; t.textContent=''; cb&&cb();}},100);
}
function holdersForCurrent(){ const a=G.currentAnnounce; return G.players.filter(p=>p.alive && p.hand.some(c=>!c.used&&c.type===a.type&&c.num===a.num)); }
function autoActivationCheck(){
  markProgress('autoActivationCheck');
  const holders=holdersForCurrent();
  if(!holders.length){ aiMaybeSpeakSocial('empty'); skipAnnounce(true); return; }
  openActivation();
}
function openActivation(){ const holders=holdersForCurrent(); if(!holders.length){ skipAnnounce(true); return; }
  const a=G.currentAnnounce; const holder=holders[0];
  if(holder.isAI){
    if(aiWantsActivate(holder,a)){
      setHost(`${a.type} ${a.num}`,`${holder.name} 正在判斷是否發動……`);
      startAISafety(`${holder.name} ${a.type}${a.num}`);
      gameTimeout(()=>{ try{ markProgress(holder.name+' AI執行'); clearAISafety(); aiActivateCard(holder); }catch(e){ console.error(e); log('⚠ '+holder.name+' AI執行錯誤，自動跳過。','warn'); clearAISafety(); nextAnnounce(); } },aiDelay());
    } else {
      log(`${holder.name} 持有 ${a.type}${a.num}，但AI判斷不發動。`);
      aiMaybeSpeakSocial('refuse');
      gameTimeout(nextAnnounce,aiDelay(.75));
    }
    return;
  }
  const sample={type:a.type,num:a.num};
  const html=`<div class="modalTitle humanText">${cardName(sample)}</div><p>你持有 <b>${cardName(sample)}</b>。請選擇翻面發動或拒絕。</p><div class="resultBox">效果：${cardEffect(sample)}</div><div class="controls"><button class="good" onclick="activateCard(${holder.id})">翻面發動</button><button class="secondary" onclick="refuseActivation(${holder.id})">不發動</button></div>`;
  modal(html);
}

  } else if(n===6){ showTricksterPopup(p,c,null,'裁判公開流派'); p.revealed=true; render(); chooseKillTarget(p,'裁判：公開自己流派並擊殺一位玩家', target=> attemptKill(p,target,'裁判')); }
}

function shouldAISwapRoles(p,a,b){
  const ar=a.role, br=b.role;
  // 簡易AI：若能把敵方低號換到較不重要的位置，或把友方低號救走，就考慮交換。
  let before=0, after=0;
  const val=r=>!r||r.faction==='浪人'?0:(isFriend(p,r)?(7-r.num)*20:isEnemy(p,r)?-(7-r.num)*20:0);
  before=val(ar)+val(br);
  after=val(br)+val(ar);
  if(p.role.faction==='浪人')return Math.random()<0.15;
  // 交換本身對總和不變，因此加一點策略：讓已知敵方低號遠離原持有人時才偶爾換。
  if(isEnemy(p,ar)&&ar.num<=2&&!isEnemy(p,br))return true;
  if(isEnemy(p,br)&&br.num<=2&&!isEnemy(p,ar))return true;
  return Math.random()<0.1;
}

    addInfo(v,`交換後：${A.name} 是 ${roleName(A.role)}，${B.name} 是 ${roleName(B.role)}`);

function canImmediatePlay(c){ return !!c && ['密探','隱士','騙徒','盲眼刺客','上忍'].includes(c.type); }
function aiShouldImmediatePlay(p,c){
  if(!canImmediatePlay(c))return false;

  if(c.type==='騙徒')return c.num===1 || c.num===3 || c.num===6;

}

function attemptKill(attacker,target,source){ markAction(attacker,target); if(!target.alive){ log(`${target.name} 已死亡，無法再次擊殺。`); nextAnnounce(); return; }
  const counter=target.hand.find(c=>!c.used&&c.type==='還施僧');
  const martyr=target.hand.find(c=>!c.used&&c.type==='殉道者');
  if(source==='上忍'||source==='盲眼刺客'||source==='裁判'){
    if(counter||martyr){
      if(target.isAI){
        setHost('反制判斷',`${target.name} 被 ${source} 擊殺，正在判斷是否發動反制……`);
        startAISafety(`${target.name} 反制判斷`);
        gameTimeout(()=>{ try{ markProgress(target.name+' 反制執行'); clearAISafety();
          // AI擁有者自行決定：還施僧優先，殉道者其次；不把判斷交給其他AI。
          if(counter && aiWantsCounter(target,attacker,source)) useCounter(target.id,attacker.id);
          else if(martyr && aiWantsMartyr(target,attacker,source)) useMartyr(target.id);
          else finalKill(attacker.id,target.id,source);
        }catch(e){ console.error(e); log('⚠ 反制判斷錯誤，自動結算死亡。','warn'); clearAISafety(); finalKill(attacker.id,target.id,source); } }, aiDelay());
      }else{
        modal(`<div class="modalTitle humanText">反制機會：${target.name}</div><p>${target.name} 被 ${source} 擊殺。你是反制牌擁有者，可自行決定是否發動。</p><div class="controls">${counter?`<button class="danger" onclick="useCounter(${target.id},${attacker.id})">還施僧：反殺</button>`:''}${martyr?`<button class="good" onclick="useMartyr(${target.id})">殉道者：死亡並抽榮譽</button>`:''}<button class="secondary" onclick="closeModal();finalKill(${attacker.id},${target.id},'${source}')">不反制</button></div>`);
      }
      return;
    }
  }
  finalKill(attacker.id,target.id,source);
}

function aiWantsMartyr(target,attacker,source){ return target.honors.reduce((a,b)=>a+b,0)<10; }
function useCounter(tid,aid){ const t=G.players[tid],a=G.players[aid]; if(!t||!t.alive){ log('反制者已死亡，還施僧無法發動。','warn'); closeModal(); gameTimeout(nextAnnounce,120); return; } if(!a||!a.alive){ log(`${a?a.name:'攻擊者'} 已死亡，還施僧沒有可反殺目標。`,'warn'); closeModal(); gameTimeout(nextAnnounce,120); return; } markAction(tid,aid); showShieldReturnEffect(t,a); const c=t.hand.find(x=>!x.used&&x.type==='還施僧'); if(c)c.used=true; closeModal(); a.alive=false; showActionPopup(t,'還施僧',a,'盾牌反彈，刀回自己'); log(`${t.name} 發動還施僧，反殺 ${a.name}！${t.name} 存活。`,'warn'); render(); showPrivate(G.humanSeat); nextAnnounce(); }

function claimText(c){
  if(!c)return '';
  const by=G.players[c.by]?.name||'玩家';
  const p=id=>G.players[id]?.name||`玩家${id+1}`;
  if(c.type==='selfFaction')return `${by}：我是${c.faction}`;
  if(c.type==='notSelfFaction')return `${by}：我不是${c.faction}`;
  if(c.type==='targetFaction')return `${by}：${p(c.target)}是${c.faction}`;
  if(c.type==='notTargetFaction')return `${by}：${p(c.target)}不是${c.faction}`;
  if(c.type==='targetNum')return `${by}：${p(c.target)}是${c.num}號`;
  if(c.type==='notTargetNum')return `${by}：${p(c.target)}不是${c.num}號`;
  if(c.type==='sameTeam')return `${by}：${p(c.a)}和${p(c.b)}肯定是一夥的`;
  if(c.type==='notSameTeam')return `${by}：${p(c.a)}和${p(c.b)}不是一夥的`;
  if(c.type==='trust')return `${by}：我比較相信${p(c.target)}`;
  if(c.type==='suspect')return `${by}：我最懷疑${p(c.target)}`;
  if(c.type==='mastermind')return `${by}：${p(c.target)}可能持有首腦`;
  if(c.type==='mastermindDead')return `${by}：我覺得首腦可能已經死亡`;
  if(c.type==='selfNinja')return `${by}：我有${c.card}`;
  if(c.type==='notSelfNinja')return `${by}：我沒有${c.card}`;
  if(c.type==='targetNinja')return `${by}：${p(c.target)}有${c.card}`;
  if(c.type==='notTargetNinja')return `${by}：${p(c.target)}沒有${c.card}`;
  return `${by}：發言`;
}

function htmlEscape(s){
  return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function normalizeTalkText(s){
  return String(s||'').trim().replace(/[，,。！!？?；;：:、]/g,' ').replace(/\s+/g,'');
}
function findPlayerInText(text, fallbackId=null){
  if(!G||!G.players)return fallbackId;
  let best=null, bestLen=0;
  for(const p of G.players){
    const names=[p.name,`玩家${p.id+1}`,`P${p.id+1}`,`${p.id+1}號玩家`].filter(Boolean);
    for(const n of names){
      if(n && text.includes(n) && n.length>bestLen){ best=p.id; bestLen=n.length; }
    }
  }
  if(best!==null)return best;
  if(/^(他|她|那個|這個|此人|對方)/.test(text) || text.includes('他是') || text.includes('他有') || text.includes('他不是') || text.includes('他沒有')) return fallbackId;
  return fallbackId;
}
function findTwoPlayersInText(text){
  if(!G||!G.players)return [];
  const hits=[];
  for(const p of G.players){
    const names=[p.name,`玩家${p.id+1}`,`P${p.id+1}`,`${p.id+1}號玩家`].filter(Boolean);
    if(names.some(n=>n&&text.includes(n))) hits.push(p.id);
  }
  return [...new Set(hits)].slice(0,2);
}
function parseFactionAndNum(text){
  const out={};
  const fm=text.match(/(蓮花|仙鶴|浪人)/);
  if(fm)out.faction=fm[1];
  const nm=text.match(/([1-5一二三四五])\s*號?/);
  if(nm){
    const map={'一':1,'二':2,'三':3,'四':4,'五':5};
    out.num=map[nm[1]]||parseInt(nm[1]);
  }
  return out;
}
function parseNinjaCardText(text){
  const special=['殉道者','還施僧','首腦'];
  for(const s of special){ if(text.includes(s))return s; }
  const trickNames={百變者:1,掘墓人:2,掘墓者:2,搗蛋鬼:3,靈魂商販:4,竊賊:5,裁判:6};
  for(const [k,n] of Object.entries(trickNames)){ if(text.includes(k))return cardName({type:'騙徒',num:n}); }
  const typeMatch=text.match(/(盲眼刺客|密探|隱士|上忍|騙徒)([1-6一二三四五六])?/);
  if(typeMatch){
    const type=typeMatch[1];
    const map={'一':1,'二':2,'三':3,'四':4,'五':5,'六':6};
    const n=typeMatch[2] ? (map[typeMatch[2]]||parseInt(typeMatch[2])) : null;
    if(type==='騙徒' && n)return cardName({type:'騙徒',num:n});
    if(n)return cardName({type,num:n});
    return type;
  }
  return null;
}
function isNegativeTalk(text){
  return /不是|沒有|沒|無|不可能|不像/.test(text);
}
function applyHumanAutoMarkFromClaim(c){
  if(!G)return;
  const h=G.players[G.humanSeat]; if(!h||!h.manualMarks)return;
  const setMark=(pid,key,val)=>{
    if(pid===undefined||pid===null)return;
    h.manualMarks[pid]=h.manualMarks[pid]||{};
    h.manualMarks[pid][key]=val;
  };
  if(c.type==='targetFaction')setMark(c.target,'faction',c.faction);
  if(c.type==='targetNum')setMark(c.target,'num',c.num);
  if(c.type==='targetNinja')setMark(c.target,'ninja',c.card);
  if(c.type==='notTargetFaction')setMark(c.target,'note',`不是${c.faction}`);
  if(c.type==='notTargetNum')setMark(c.target,'note',`不是${c.num}號`);
  if(c.type==='notTargetNinja')setMark(c.target,'note',`沒有${c.card}`);
}
function addParsedClaims(claims){
  if(!claims||!claims.length)return false;
  for(const c of claims){
    applyHumanAutoMarkFromClaim(c);
    addClaim(c);
  }
  return true;
}
function parseFreeTalkToClaims(raw){
  const human=G.players[G.humanSeat];
  const text=normalizeTalkText(raw);
  const fallback=parseInt(document.getElementById('freeTalkTarget')?.value||human.id);
  const claims=[];
  if(!text)return {claims:[],message:'請先輸入發言。'};
  if(/首腦.*(死|死亡|不在|沒了)/.test(text)){
    claims.push({by:human.id,type:'mastermindDead'});
    return {claims,message:'判斷：首腦可能已死亡'};
  }
  const two=findTwoPlayersInText(text);
  if(two.length>=2 && /一夥|同夥|同隊|一隊/.test(text)){
    claims.push({by:human.id,type:isNegativeTalk(text)?'notSameTeam':'sameTeam',a:two[0],b:two[1]});
    return {claims,message:'判斷：兩人關係'};
  }
  const target=findPlayerInText(text,fallback);
  if(/相信|信任/.test(text) && target!==null && target!==human.id){ claims.push({by:human.id,type:'trust',target}); return {claims,message:'判斷：信任目標'}; }
  if(/懷疑|可疑|有問題|不相信/.test(text) && target!==null && target!==human.id){ claims.push({by:human.id,type:'suspect',target}); return {claims,message:'判斷：懷疑目標'}; }
  const card=parseNinjaCardText(text);
  if(card){
    const self=/^我|我是|我有|我沒有|自己/.test(text);
    const neg=isNegativeTalk(text);
    if(self){
      claims.push({by:human.id,type:neg?'notSelfNinja':'selfNinja',card});
    }else{
      claims.push({by:human.id,type:neg?'notTargetNinja':'targetNinja',target,card});
    }
    return {claims,message:`判斷：忍者牌 ${card}`};
  }
  if(/首腦/.test(text) && target!==null){
    claims.push({by:human.id,type:'mastermind',target});
    return {claims,message:'判斷：目標可能持有首腦'};
  }
  const rn=parseFactionAndNum(text);
  if(rn.faction||rn.num){
    const self=/^我|我是|我不|自己/.test(text);
    const neg=isNegativeTalk(text);
    if(rn.faction){
      if(self)claims.push({by:human.id,type:neg?'notSelfFaction':'selfFaction',faction:rn.faction});
      else claims.push({by:human.id,type:neg?'notTargetFaction':'targetFaction',target,faction:rn.faction});
    }
    if(rn.num){
      claims.push({by:human.id,type:neg?'notTargetNum':'targetNum',target:self?human.id:target,num:rn.num});
    }
    return {claims,message:`判斷：${rn.faction||''}${rn.num?rn.num+'號':''}`};
  }
  return {claims:[],message:'AI暫時無法解析這句，可改成「他是蓮花1號」「飛燕有上忍3」「玄武和白狐是一夥的」。'};
}

function aiSpeak(p,c){ if(!p||!p.isAI)return; addClaim(Object.assign({by:p.id, aiGenerated:true},c)); }
function aiReactToClaim(c){
  if(!G||!c||c.aiGenerated)return;
  const speaker=G.players[c.by];
  if(!speaker)return;
  // 精簡AI：不再亂聊；只在有人發言後，根據可信度與私人情報表達信任或懷疑。
  const ais=G.players.filter(p=>p.isAI&&p.alive&&p.id!==c.by);
  if(!ais.length)return;
  // 一句話最多觸發1名AI反應，避免洗版。
  const candidates=ais.filter(p=>Math.random()<Math.min(0.65, personaRate(p)*0.55));
  const p=(candidates[0]||ais[Math.floor(Math.random()*ais.length)]);
  if(!p || Math.random()>0.42)return;
  const db=ensureAIDB(p);
  const trust=(db.trust&&db.trust[c.by]!==undefined)?db.trust[c.by]:50;
  let suspicion=50-trust;
  // 如果AI私下查到這句話是假的，提高懷疑；查到是真的，提高信任。
  const mem=ensureMemory(p);
  function knownTargetRole(id){ return mem.roles&&mem.roles[id]; }
  if(c.type==='targetFaction' && knownTargetRole(c.target)) suspicion += (knownTargetRole(c.target).faction===c.faction)?-24:28;
  if(c.type==='notTargetFaction' && knownTargetRole(c.target)) suspicion += (knownTargetRole(c.target).faction!==c.faction)?-14:20;
  if(c.type==='targetNum' && knownTargetRole(c.target)) suspicion += (knownTargetRole(c.target).num===c.num)?-18:22;
  if(c.type==='notTargetNum' && knownTargetRole(c.target)) suspicion += (knownTargetRole(c.target).num!==c.num)?-10:16;
  if(c.type==='selfFaction') suspicion += (speaker.role&&speaker.role.faction===c.faction)?-8:10; // AI不可直接驗證別人自稱，僅微調
  const targetForComment = (c.type==='targetFaction'||c.type==='notTargetFaction'||c.type==='targetNum'||c.type==='notTargetNum'||c.type==='targetNinja'||c.type==='notTargetNinja'||c.type==='mastermind') ? c.target : c.by;
  if(suspicion>=58){ aiSpeak(p,{type:'suspect',target:c.by}); }
  else if(suspicion<=30){ aiSpeak(p,{type:'trust',target:c.by}); }
  else if(targetForComment!==undefined && Math.random()<0.30){
    // 中立時只針對發言內容中的目標提醒懷疑，仍然只說信任/懷疑類。
    aiSpeak(p,{type:Math.random()<0.55?'suspect':'trust',target:targetForComment});
  }
}

function cloneRoleForDB(r){ return r?{faction:r.faction,num:r.num}:null; }
function summarizeRoundForAI(p,winnerIds,text){
  const mem=ensureMemory(p);
  const db=ensureAIDB(p);
  const seenRoles={};
  for(const [id,r] of Object.entries(mem.roles||{})) seenRoles[id]=cloneRoleForDB(r);
  const seenCards={};
  for(const [id,c] of Object.entries(mem.cards||{})) seenCards[id]=c?cardName(c):'未知';
  const summary={
    round:G.round,
    selfName:p.name,
    selfRole:cloneRoleForDB(p.role),
    selfHand:p.hand.map(cardName),
    aliveAtReveal:p.alive,
    winners:[...winnerIds],
    won:winnerIds.includes(p.id),
    publicTalk:(G.publicClaims||[]).slice(0,20).map(c=>({text:claimText(c),raw:c})),
    privateSeenRoles:seenRoles,
    privateSeenCards:seenCards,
    resultText:text
  };
  db.rounds.unshift(summary);
  db.rounds=db.rounds.slice(0,AI_DB_LIMIT);
  updateTrustFromRound(p, winnerIds);
  addInfo(p,`AI記憶庫更新：第${G.round}局，${summary.won?'本局獲勝':'本局未勝'}，目前${db.rounds.length}/100局。`);
}
function updateTrustFromRound(p,winnerIds){
  const db=ensureAIDB(p);
  const claims=(G.publicClaims||[]).slice(0,40);
  for(const c of claims){
    if(c.by===p.id)continue;
    if(db.trust[c.by]===undefined)db.trust[c.by]=50;
    let delta=0;
    const speaker=G.players[c.by];
    if(!speaker)continue;
    const sr=speaker.role;
    if(c.type==='selfFaction') delta += (sr.faction===c.faction)?8:-10;
    if(c.type==='notSelfFaction') delta += (sr.faction!==c.faction)?5:-7;
    if(c.type==='targetFaction'&&G.players[c.target]) delta += (G.players[c.target].role.faction===c.faction)?7:-9;
    if(c.type==='notTargetFaction'&&G.players[c.target]) delta += (G.players[c.target].role.faction!==c.faction)?5:-7;
    if(c.type==='targetNum'&&G.players[c.target]) delta += (G.players[c.target].role.num===c.num)?6:-6;
    if(c.type==='notTargetNum'&&G.players[c.target]) delta += (G.players[c.target].role.num!==c.num)?4:-5;
    if(c.type==='selfNinja') delta += (speaker.hand.some(x=>cardName(x)===c.card))?5:-6;
    if(c.type==='notSelfNinja') delta += (!speaker.hand.some(x=>cardName(x)===c.card))?3:-4;
    if(c.type==='targetNinja'&&G.players[c.target]) delta += (G.players[c.target].hand.some(x=>cardName(x)===c.card))?5:-6;
    if(c.type==='notTargetNinja'&&G.players[c.target]) delta += (!G.players[c.target].hand.some(x=>cardName(x)===c.card))?3:-4;
    if(c.type==='sameTeam'&&G.players[c.a]&&G.players[c.b]) delta += (G.players[c.a].role.faction===G.players[c.b].role.faction)?6:-8;
    if(c.type==='notSameTeam'&&G.players[c.a]&&G.players[c.b]) delta += (G.players[c.a].role.faction!==G.players[c.b].role.faction)?6:-8;
    if(c.type==='suspect'&&G.players[c.target]){
      const tr=G.players[c.target].role;
      if(sr.faction!=='浪人'&&tr.faction!==sr.faction&&tr.faction!=='浪人')delta+=4; else delta-=3;
    }
    db.trust[c.by]=Math.max(5,Math.min(95,db.trust[c.by]+delta));
  }
}
function storeRoundDatabases(winners,text){
  const ids=winners.map(p=>p.id);
  for(const p of G.players){ if(p.isAI) summarizeRoundForAI(p,ids,text); }
  log(`AI獨立記憶庫已更新：每名AI只記錄自己的查驗、手牌、公開發言與本局結果；不共享私人情報。`,'info');
}
function clearAIDatabases(){
  if(!G)return;
  for(const p of G.players){ if(p.isAI)p.aiDB={rounds:[],trust:{},lies:0,trueTalk:0}; }
  log('10分遊戲結束：所有AI的100局記憶庫已刷新。','warn');
}
function beginReveal(){ G.stage='reveal'; G.currentAnnounce=null; render(); setHost('揭示階段','所有玩家翻開流派，判定首腦與勝負。',`<button onclick="resolveReveal()">開始揭示判定</button>`); log('進入揭示階段。','info'); }
function resolveReveal(){
  G.players.forEach(p=>p.revealed=true); render();
  const alive=G.players.filter(p=>p.alive);
  const aliveMaster=alive.filter(p=>p.hand.some(c=>c.type==='首腦'));
  let winners=[]; let text='';
  const roninMaster=aliveMaster.find(p=>p.role.faction==='浪人');
  if(roninMaster){ winners=[roninMaster]; text=`浪人 ${roninMaster.name} 持有首腦且存活，成為唯一勝利者！`; }
  else if(aliveMaster.length){
    const m=aliveMaster[0]; const faction=m.role.faction; winners=alive.filter(p=>p.role.faction===faction); text=`${m.name} 持有首腦且存活，${faction}派直接獲勝！`;
    winners.push(...alive.filter(p=>p.role.faction==='浪人'));
  } else {
    const lotus=alive.filter(p=>p.role.faction==='蓮花').sort((a,b)=>a.role.num-b.role.num);
    const crane=alive.filter(p=>p.role.faction==='仙鶴').sort((a,b)=>a.role.num-b.role.num);
    const cmp=compareFaction(lotus,crane);
    if(cmp>0){ winners=lotus; text='蓮花派以存活數字較小獲勝！'; }
    else if(cmp<0){ winners=crane; text='仙鶴派以存活數字較小獲勝！'; }
    else { winners=alive.filter(p=>p.role.faction!=='浪人'); text='兩派完全相同，所有存活的兩派玩家獲勝！'; }
    winners.push(...alive.filter(p=>p.role.faction==='浪人'));
  }
  winners=[...new Map(winners.map(p=>[p.id,p])).values()];
  storeRoundDatabases(winners,text);
  for(const p of winners){ const h=drawHonor(); p.honors.push(h); }
  const honorText=winners.map(p=>`${p.name} 抽取1枚榮譽標記`).join('、')||'無人抽取榮譽';
  log(`<b>${text}</b><br>${honorText}`,'ok');
  const max=Math.max(...G.players.map(p=>p.honors.reduce((a,b)=>a+b,0)));
  if(max>=10){ G.stage='gameover'; render(); const champs=G.players.filter(p=>p.honors.reduce((a,b)=>a+b,0)===max); setHost('遊戲結束',`<span class="winner">${champs.map(p=>p.name).join('、')} 以 ${max} 分獲勝！</span>`,`<button onclick="resetGame()">重新開始</button>`); log(`有人達到10分，遊戲結束。最高分：${max}`,'ok'); clearAIDatabases(); render(); }
  else { render(); setHost('本局結束',`${text}<br><span class="small">勝利者已抽取榮譽，分數加入各自私人資訊。</span>`,`<button onclick="nextRound()">開始新一局</button><button id="pauseToggleBtnTop" class="secondary" onclick="togglePause()">⏸ 暫停</button><button class="secondary" onclick="resetGame()">重新開始</button>`); }
}
function compareFaction(a,b){
  const len=Math.max(a.length,b.length);
  for(let i=0;i<len;i++){
    if(!a[i]&&!b[i])return 0; if(!a[i])return -1; if(!b[i])return 1;
    if(a[i].role.num<b[i].role.num)return 1; if(a[i].role.num>b[i].role.num)return -1;
  } return 0;
}
function nextRound(){
  const n=G.n;
  const roles=makeRoles(n);
  G.round++;
  G.deck=makeDeck(); G.discard=[]; G.stage='draft1'; G.paused=false; G.pausedCallbacks=[]; G.aiTalkRate=DEFAULT_AI_TALK_RATE; G.currentAnnounce=null; G.announceQueue=[]; G.activeActorId=null; G.activeTargetIds=[]; G.draftPass=[]; G.publicClaims=[];
  // 重新隨機入座，但人物本身、姓名、榮譽標記都跟著同一個人移動。
  G.players=shuffle(G.players);
  for(let i=0;i<n;i++){
    const p=G.players[i];
    p.id=i;
    p.isAI=!p.isHuman;
    p.role=roles[i];
    p.alive=true;
    p.hand=[];
    p.draft=G.deck.splice(0,3);
    p.revealed=false;
    p.infoLog=[];
    p.lastSpeech='';
    p.memory={roles:{},cards:{},claims:[]};
    p.manualMarks={};
    ensureAIDB(p);
    addInfo(p,`你的流派：${roleName(p.role)}`);
    if(p.isAI) addInfo(p,`AI獨立記憶庫：${aiDBCount(p)}/100局，不共享給其他AI。`);
  }
  G.humanSeat=G.players.findIndex(p=>p.isHuman);
  log(`第 ${G.round} 局開始。所有人物重新隨機入座；${G.players[G.humanSeat].name} 目前在第 ${G.humanSeat+1} 號座位。榮譽標記跟著人物保留。`,'info');
  render(); beginDraft1(); showPrivate(G.humanSeat);
}
</script>
